name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  prepare:
    name: Check release version
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.version.outputs.release }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version tag
        id: version
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          if git rev-parse --verify --quiet "refs/tags/${tag}" >/dev/null; then
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.artifact }}
    needs: prepare
    if: needs.prepare.outputs.release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux/amd64
            artifact: gemihub-desktop-linux-amd64
          - os: ubuntu-22.04-arm
            platform: linux/arm64
            artifact: gemihub-desktop-linux-arm64
          - os: macos-14
            platform: darwin/arm64
            artifact: gemihub-desktop-darwin-arm64
          - os: windows-latest
            platform: windows/amd64
            artifact: gemihub-desktop-windows-amd64.exe
          - os: windows-latest
            platform: windows/arm64
            artifact: gemihub-desktop-windows-arm64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.0

      - name: Install Linux Wails dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Check frontend
        run: deno task check

      - name: Test frontend
        run: deno task test

      # main.go embeds dist at compile time, so a clean checkout must produce
      # the frontend assets before any Go package can be compiled or tested.
      - name: Build frontend assets
        run: deno task build

      - name: Test backend
        run: go test -count=1 ./...

      - name: Build binary
        run: go run github.com/wailsapp/wails/v2/cmd/wails@v2.10.2 build -devtools -clean -nopackage -platform ${{ matrix.platform }} -o ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Create draft release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          draft: true
          files: |
            dist/*
            THIRD_PARTY_NOTICES.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
